<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>早安圖分享</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #ffffff; font-family: sans-serif; text-align: center; }
        .container { width: 100%; max-width: 500px; margin: 0 auto; }
        #mainImg { width: 100%; display: block; }
        .info-box { padding: 40px 20px; }
        .status-text { color: #00c300; font-size: 20px; font-weight: bold; }
        .share-btn { 
            background-color: #00c300; color: white; border: none; 
            padding: 18px; border-radius: 50px; font-size: 20px; 
            font-weight: bold; width: 90%; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="" id="mainImg">
    <div class="info-box">
        <div id="status" class="status-text">🚀 正在自動開啟分享選單...</div>
        <button class="share-btn" id="btnShare">手動選擇好友分享</button>
    </div>
</div>

<script>
    const MY_LIFF_ID = '2010018151-9jXRcdtg'; 
    let rawImgUrl = '';

    function getImageUrlFromUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        let img = urlParams.get('img');
        if (!img && urlParams.get('liff.state')) {
            const stateParams = new URLSearchParams(urlParams.get('liff.state'));
            img = stateParams.get('img');
        }
        return img;
    }

    async function main() {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            rawImgUrl = getImageUrlFromUrl();
            if (rawImgUrl) {
                document.getElementById('mainImg').src = rawImgUrl;
            }

            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const auto = new URLSearchParams(window.location.search).get('autoShare');
                if (auto === '1') {
                    setTimeout(handleShare, 800); 
                }
                document.getElementById('btnShare').onclick = handleShare;
            }
        } catch (err) {
            document.getElementById('status').innerText = '系統錯誤：' + err;
        }
    }

    async function handleShare() {
        if (!rawImgUrl) return;
        const safeImgUrl = encodeURI(rawImgUrl);
        
        // 這是下面綠色按鈕用的「分享網址」
        const liffShareUrl = "https://liff.line.me/" + MY_LIFF_ID + "?img=" + safeImgUrl + "&autoShare=1";
        
        // ⭐⭐⭐ 把這裡換成你想要點圖跳過去的網址！ ⭐⭐⭐
        const targetUrl = "https://cookcalai.com"; 

        try {
            const res = await liff.shareTargetPicker([
                {
                    "type": "flex",
                    "altText": "☀️ 您有一張新的早安圖！",
                    "contents": {
                        "type": "bubble",
                        "hero": {
                            "type": "image",
                            "url": safeImgUrl,
                            "size": "full",
                            "aspectRatio": "3:4",
                            "aspectMode": "cover",
                            "action": {
                                "type": "uri",
                                "uri": targetUrl // 圖片點下去會跳到 targetUrl
                            }
                        },
                        "footer": {
                            "type": "box",
                            "layout": "vertical",
                            "contents": [
                                {
                                    "type": "button",
                                    "style": "primary",
                                    "color": "#00c300",
                                    "action": {
                                        "type": "uri",
                                        "label": "一鍵分享給親友",
                                        "uri": liffShareUrl // 綠色按鈕點下去會繼續分享
                                    }
                                }
                            ]
                        }
                    }
                }
            ]);
            if (res) liff.closeWindow(); 
        } catch (error) {
            console.log("分享失敗", error);
        }
    }
    main();
</script>
</body>
</html>
