<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>早安圖分享</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #ffffff; font-family: sans-serif; }
        .container { width: 100%; max-width: 500px; margin: 0 auto; text-align: center; }
        .image-header img { width: 100%; display: block; border-bottom: 2px solid #eee; }
        .info-box { padding: 20px; }
        .status-text { color: #555; font-size: 18px; margin-bottom: 15px; font-weight: bold; }
        .share-btn { 
            background-color: #00c300; color: white; border: none; 
            padding: 18px; border-radius: 50px; font-size: 20px; 
            font-weight: bold; width: 90%; cursor: pointer; display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .share-btn:active { background-color: #00a000; transform: scale(0.98); }
    </style>
</head>
<body>

<div class="container">
    <div class="image-header">
        <img src="" id="mainImg" alt="今日早安圖">
    </div>
    <div class="info-box">
        <div id="status" class="status-text">🚀 正在為您開啟分享選單...</div>
        <button class="share-btn" id="btnShare">點我選擇親友分享</button>
        <p id="hint" style="color: #999; font-size: 14px; margin-top: 10px; display:none;">
            若沒自動跳出，請點上方綠色按鈕
        </p>
    </div>
</div>

<script>
    const MY_LIFF_ID = '2010018151-9jXRcdtg'; 
    let finalImgUrl = '';

    function getImageUrlFromUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        let img = urlParams.get('img');
        if (!img && urlParams.get('liff.state')) {
            const stateParams = new URLSearchParams(urlParams.get('liff.state'));
            img = stateParams.get('img');
        }
        return img;
    }

    async function main() {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            finalImgUrl = getImageUrlFromUrl();

            if (finalImgUrl) {
                document.getElementById('mainImg').src = finalImgUrl;
                document.getElementById('btnShare').style.display = 'inline-block';
                document.getElementById('hint').style.display = 'block';
            }

            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                // *** 關鍵：自動觸發分享 ***
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('autoShare') === '1') {
                    setTimeout(() => {
                        handleShare();
                    }, 500); // 稍微延遲讓網頁載入更穩
                }
                
                document.getElementById('btnShare').onclick = handleShare;
            }
        } catch (err) {
            document.getElementById('status').innerText = '系統錯誤：' + err;
        }
    }

    async function handleShare() {
    if (!liff.isApiAvailable('shareTargetPicker')) {
        alert('請在 LINE App 內開啟此功能');
        return;
    }
    try {
        // 使用最穩定的「純圖片」格式發送
        const res = await liff.shareTargetPicker([
            {
                "type": "image",
                "originalContentUrl": finalImgUrl, // 這裡會自動帶入你的早安圖網址
                "previewImageUrl": finalImgUrl
            }
        ]);

        if (res) {
            // 分享成功後，彈出提示並關閉視窗
            alert("已成功分享！");
            liff.closeWindow(); 
        } else {
            // 使用者點擊了取消分享
            console.log("使用者取消分享");
        }
    } catch (error) {
        // 捕捉錯誤，方便我們知道發生什麼事
        alert("分享失敗，原因：" + error.message);
    }
}

    main();
</script>
</body>
</html>
