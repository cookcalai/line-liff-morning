<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>早安圖分享</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f4f4; font-family: sans-serif; text-align: center; }
        .container { width: 100%; max-width: 500px; margin: 0 auto; background: #fff; padding-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); min-height: 100vh;}
        #mainImg { width: 100%; min-height: 200px; background-color: #e0e0e0; display: block; object-fit: cover; }
        .info-box { padding: 30px 20px; }
        .status-text { color: #00c300; font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .share-btn { 
            background-color: #00c300; color: white; border: none; 
            padding: 16px; border-radius: 12px; font-size: 18px; 
            font-weight: bold; width: 100%; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="" id="mainImg" alt="正在載入圖片...">
    <div class="info-box">
        <div id="status" class="status-text">🚀 正在自動開啟分享選單...</div>
        <button class="share-btn" id="btnShare">手動選擇好友分享</button>
    </div>
</div>

<script>
    const MY_LIFF_ID = '2010018151-9jXRcdtg'; 
    let rawImgUrl = '';

    function getImageUrlFromUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        let img = urlParams.get('img');
        if (!img && urlParams.get('liff.state')) {
            let stateStr = urlParams.get('liff.state');
            if (!stateStr.startsWith('?')) stateStr = '?' + stateStr;
            const stateParams = new URLSearchParams(stateStr);
            img = stateParams.get('img');
        }
        return img;
    }

    async function main() {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            rawImgUrl = getImageUrlFromUrl();
            
            if (rawImgUrl) {
                // 畫面上先顯示圖片，讓使用者安心
                try {
                    document.getElementById('mainImg').src = decodeURI(rawImgUrl);
                } catch(e) {
                    document.getElementById('mainImg').src = rawImgUrl;
                }
            }

            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const auto = new URLSearchParams(window.location.search).get('autoShare');
                if (auto === '1') {
                    setTimeout(handleShare, 800); 
                }
                document.getElementById('btnShare').onclick = handleShare;
            }
        } catch (err) {
            document.getElementById('status').innerText = '系統錯誤：' + err;
        }
    }

    async function handleShare() {
        if (!rawImgUrl) return;

        // 🌟 核心防護網：先解除所有編碼，再重新編碼一次，徹底消滅 %2520 破圖問題！
        let cleanUrl = rawImgUrl;
        try {
            cleanUrl = decodeURI(rawImgUrl); // 將可能重複的 %20 還原成純空白
        } catch (e) {}
        const safeImgUrl = encodeURI(cleanUrl); // 確保乾淨地轉成 %20 (不多也不少！)
        
        // 綠色按鈕用的分享網址
        const liffShareUrl = "https://liff.line.me/" + MY_LIFF_ID + "?autoShare=1&img=" + encodeURIComponent(safeImgUrl);
        
        // ⭐ 點擊圖片跳轉加好友的網址
        const targetUrl = "https://line.me/R/ti/p/@354chtno"; 

        try {
            const res = await liff.shareTargetPicker([
                {
                    "type": "flex",
                    "altText": "☀️ 您有一張新的早安圖！",
                    "contents": {
                        "type": "bubble",
                        "hero": {
                            "type": "image",
                            "url": safeImgUrl,
                            "size": "full",
                            "aspectRatio": "3:4",
                            "aspectMode": "cover",
                            "action": {
                                "type": "uri",
                                "uri": targetUrl
                            }
                        },
                        "footer": {
                            "type": "box",
                            "layout": "vertical",
                            "contents": [
                                {
                                    "type": "button",
                                    "style": "primary",
                                    "color": "#00c300",
                                    "action": {
                                        "type": "uri",
                                        "label": "一鍵分享給親友",
                                        "uri": liffShareUrl
                                    }
                                }
                            ]
                        }
                    }
                }
            ]);
            if (res) liff.closeWindow(); 
        } catch (error) {
            console.log("分享失敗", error);
            document.getElementById('status').innerText = '❌ 分享失敗，請重試';
        }
    }
    main();
</script>
</body>
</html>
