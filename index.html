<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>早安圖分享</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #ffffff; font-family: sans-serif; text-align: center; }
        .container { width: 100%; max-width: 500px; margin: 0 auto; }
        #mainImg { width: 100%; display: block; border-bottom: 2px solid #eee; }
        .info-box { padding: 30px 20px; }
        .status-text { color: #00c300; font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        .share-btn { 
            background-color: #00c300; color: white; border: none; 
            padding: 18px; border-radius: 50px; font-size: 20px; 
            font-weight: bold; width: 90%; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="image-header">
        <img src="" id="mainImg" alt="今日早安圖">
    </div>
    <div class="info-box">
        <div id="status" class="status-text">🚀 正在為您開啟分享選單...</div>
        <button class="share-btn" id="btnShare" style="display:none;">點我選擇好友分享</button>
    </div>
</div>

<script>
    const MY_LIFF_ID = '2010018151-9jXRcdtg'; 
    let rawImgUrl = '';

    function getImageUrlFromUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        let img = urlParams.get('img');
        if (!img && urlParams.get('liff.state')) {
            const stateParams = new URLSearchParams(urlParams.get('liff.state'));
            img = stateParams.get('img');
        }
        return img;
    }

    async function main() {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            rawImgUrl = getImageUrlFromUrl();

            if (rawImgUrl) {
                document.getElementById('mainImg').src = rawImgUrl;
                document.getElementById('btnShare').style.display = 'inline-block';
            }

            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('autoShare') === '1') {
                    setTimeout(handleShare, 800); 
                }
                document.getElementById('btnShare').onclick = handleShare;
            }
        } catch (err) {
            document.getElementById('status').innerText = '系統錯誤：' + err;
        }
    }

    async function handleShare() {
        if (!rawImgUrl) return;
        const safeImgUrl = encodeURI(rawImgUrl);

        try {
            const res = await liff.shareTargetPicker([
                {
                    "type": "image",
                    "originalContentUrl": safeImgUrl,
                    "previewImageUrl": safeImgUrl
                }
            ]);
            if (res) {
                // 這裡把 alert 刪掉了，分享完直接關閉，超順暢！
                liff.closeWindow(); 
            }
        } catch (error) {
            console.log("分享失敗");
        }
    }

    main();
</script>
</body>
</html>
