<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>早安圖分享</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { margin: 0; padding: 20px; background-color: #ffffff; font-family: sans-serif; text-align: center; }
        .container { width: 100%; max-width: 500px; margin: 0 auto; }
        #mainImg { width: 100%; border-radius: 10px; display: none; margin-bottom: 20px; }
        .share-btn { 
            background-color: #00c300; color: white; border: none; 
            padding: 18px; border-radius: 50px; font-size: 20px; 
            font-weight: bold; width: 100%; cursor: pointer; display: none;
        }
        #status { color: #666; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <img src="" id="mainImg">
    <div id="status">🚀 正在準備您的早安圖...</div>
    <button class="share-btn" id="btnShare">點我選擇好友分享</button>
</div>

<script>
    const MY_LIFF_ID = '2010018151-9jXRcdtg'; 
    let finalImgUrl = '';

    function getImageUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        let img = urlParams.get('img');
        if (!img && urlParams.get('liff.state')) {
            const stateParams = new URLSearchParams(urlParams.get('liff.state'));
            img = stateParams.get('img');
        }
        return img;
    }

    async function main() {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            finalImgUrl = getImageUrl();

            if (finalImgUrl) {
                // 修正網址：把空格換成編碼，避免 LINE 攔截
                finalImgUrl = finalImgUrl.trim().replace(/\s/g, '%20');
                
                document.getElementById('mainImg').src = finalImgUrl;
                document.getElementById('mainImg').style.display = 'block';
                document.getElementById('btnShare').style.display = 'block';
                document.getElementById('status').innerText = '準備就緒！';

                if (!liff.isLoggedIn()) {
                    liff.login();
                } else if (new URLSearchParams(window.location.search).get('autoShare') === '1') {
                    setTimeout(handleShare, 500);
                }
            } else {
                document.getElementById('status').innerText = '❌ 錯誤：找不到圖片網址！';
            }
            
            document.getElementById('btnShare').onclick = handleShare;
        } catch (err) {
            alert('LIFF 初始化失敗: ' + err);
        }
    }

    async function handleShare() {
        if (!finalImgUrl || finalImgUrl === "") {
            alert("網址是空的，無法分享！");
            return;
        }

        try {
            const res = await liff.shareTargetPicker([
                {
                    "type": "image",
                    "originalContentUrl": finalImgUrl,
                    "previewImageUrl": finalImgUrl
                }
            ]);
            if (res) {
                liff.closeWindow(); 
            }
        } catch (error) {
            alert("分享過程發生錯誤：" + error.message);
        }
    }

    main();
</script>
</body>
</html>
